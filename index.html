  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Georgia', serif; background: #F0E8DC; }

    .top-bar {
      background: #E2D3C0;
      text-align: center;
      padding: 10px 16px;
      font-family: Arial, sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: #2C1F14;
      letter-spacing: 0.5px;
    }

    .hero {
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 520px;
      object-fit: cover;
      object-position: top center;
      display: block;
      border-radius: 0 0 32px 32px;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      padding: 24px 24px 32px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: linear-gradient(to top, rgba(44,31,20,0.85) 0%, rgba(44,31,20,0.55) 35%, rgba(44,31,20,0.0) 60%);
      border-radius: 0 0 32px 32px;
    }

    .hero-title {
      font-family: Georgia, serif;
      font-weight: 700;
      font-size: clamp(20px, 5vw, 28px);
      color: #fff;
      text-transform: uppercase;
      line-height: 1.2;
      margin-bottom: 12px;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .hero-sub {
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.92);
      text-align: center;
      line-height: 1.6;
    }

    .content {
      background: #F0E8DC;
      padding: 28px 20px 32px;
      text-align: center;
    }

    .contacts-label {
      font-family: Arial, sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 1px;
      color: #2C1F14;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 380px;
      margin: 0 auto 14px;
      padding: 16px 20px;
      border-radius: 50px;
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      color: #fff;
    }

    .btn-green {
      background: #25D366;
      box-shadow: 0 4px 20px rgba(37,211,102,0.4);
    }

    .wpp-icon { width: 20px; height: 20px; flex-shrink: 0; }

    .reseller-text {
      font-family: Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 1.5px;
      color: #6B4C35;
      text-transform: uppercase;
      margin: 24px 0 16px;
    }

    .reseller-text strong { color: #2C1F14; }

    .logo-area {
      text-align: center;
      margin-bottom: 8px;
    }

    .logo-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #C1673A, #A0512C);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      border: 3px solid #D4845C;
    }

    .logo-circle-text {
      font-family: Georgia, serif;
      font-size: 26px;
      font-weight: 700;
      color: #F0E8DC;
      letter-spacing: 1px;
    }

    .logo-name {
      font-family: Georgia, serif;
      font-size: 20px;
      font-weight: 700;
      color: #2C1F14;
      letter-spacing: 0.5px;
      margin-top: 10px;
    }

    .logo-sub {
      font-family: Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #6B4C35;
      margin-top: 4px;
    }

    .divider {
      height: 2px;
      background: linear-gradient(to right, #C1673A, #D4845C, #C1673A);
      margin: 16px 0 0;
      border-radius: 2px;
    }

    /* Efeito shake — mais rápido que o original da Stylo Próprio */
    @keyframes shake {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      10% { transform: translateX(-4px) rotate(-1deg); }
      20% { transform: translateX(4px) rotate(1deg); }
      30% { transform: translateX(-4px) rotate(-1deg); }
      40% { transform: translateX(4px) rotate(1deg); }
      50% { transform: translateX(-3px) rotate(0deg); }
      60% { transform: translateX(3px) rotate(0deg); }
      70% { transform: translateX(-2px) rotate(0deg); }
      80% { transform: translateX(2px) rotate(0deg); }
      90% { transform: translateX(-1px) rotate(0deg); }
    }

    .btn-shake {
      animation: shake 2.2s ease-in-out infinite;
      animation-delay: 0.8s;
    }
  </style>

      <p class="logo-name">Stylo Próprio</p>
      <p class="logo-sub">Moda Feminina</p>
